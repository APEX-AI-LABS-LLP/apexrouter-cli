[plugin]
name        = "apexrouter-browser"
version     = "0.1.0"
description = "Browser tool family — Camoufox / chromium / Browserbase via wcore-browser"
entry       = "builtin:apexrouter_browser"
authors     = ["ApexRouter-CLI"]
license     = "MIT"

[permissions]
register_tools      = true
tool_namespace      = "Browser"
register_hooks      = false
register_providers  = false
register_agents     = false
register_skills     = false
register_rules      = false
register_mcp_server = false
